name: Type Drift Detection

on:
  push:
    branches: [main]
    paths:
      - "src/core/models.py"
      - "scripts/gen_types.py"
      - "dashboard/functions/api/_types.generated.ts"
  pull_request:
    paths:
      - "src/core/models.py"
      - "scripts/gen_types.py"
      - "dashboard/functions/api/_types.generated.ts"

jobs:
  check-drift:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install Python deps
        run: pip install -e ".[dev]"

      - name: Install Node deps
        run: npm ci
        working-directory: dashboard

      - name: Regenerate types
        run: python scripts/gen_types.py

      - name: Check for drift
        run: git diff --exit-code dashboard/functions/api/_types.generated.ts
